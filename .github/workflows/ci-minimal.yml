name: CI Minimal

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality:
    name: Lint and Fast Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend/workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt

      - name: Lint
        run: pnpm lint

      - name: Fast tests
        run: pnpm test:fast
