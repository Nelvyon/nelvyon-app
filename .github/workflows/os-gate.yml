name: OS Autonomous Gate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  os-gate:
    name: OS Autonomous Production Gate
    runs-on: ubuntu-latest
    # Non-blocking: alerts but does not prevent merge
    continue-on-error: true
    # Skip if no staging URL is configured (forks, branches without vars)
    if: ${{ vars.STAGING_BASE_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run OS Autonomous Gate
        env:
          BASE_URL: ${{ vars.STAGING_BASE_URL || secrets.STAGING_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/run-os-autonomous-gate.mjs --base-url "$BASE_URL"
