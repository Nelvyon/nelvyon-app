name: Web Quality Gates

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-quality-gates.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/web/**"
      - ".github/workflows/web-quality-gates.yml"

jobs:
  web-gates:
    name: Typecheck, lint, smoke, bot evals
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality gate
        run: pnpm gate

      - name: Anti-MOCK gate (falla si const MOCK en /saas pages)
        working-directory: .
        run: |
          if grep -r --include="*.tsx" "const MOCK" apps/web/src/app/saas/; then
            echo "❌ FAIL: const MOCK encontrado en páginas /saas/. Elimina los datos falsos."
            exit 1
          fi
          echo "✅ Anti-MOCK gate: 0 const MOCK encontrados"

      - name: Anti-stub gate (falla si /api/saas/* stub sin requireSaasContext)
        working-directory: .
        run: node scripts/check-saas-stubs.mjs

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright E2E smoke (launch + local-pack)
        run: pnpm test:e2e --project=chromium apps/web/e2e/launch.spec.ts apps/web/e2e/local-pack-smoke.spec.ts
        env:
          CI: "true"

      - name: Full regression tests (non-blocking signal)
        run: pnpm test:regression
        continue-on-error: true
