name: Web Quality Gates

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "backend/**"
      - ".github/workflows/web-quality-gates.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/web/**"
      - "backend/**"
      - ".github/workflows/web-quality-gates.yml"

jobs:
  web-gates:
    name: Typecheck, lint, smoke, bot evals
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality gate
        run: pnpm gate

      - name: Anti-MOCK gate (falla si const MOCK en /saas pages)
        working-directory: .
        run: |
          if grep -r --include="*.tsx" "const MOCK" apps/web/src/app/saas/; then
            echo "❌ FAIL: const MOCK encontrado en páginas /saas/. Elimina los datos falsos."
            exit 1
          fi
          echo "✅ Anti-MOCK gate: 0 const MOCK encontrados"

      - name: Anti-stub gate (falla si /api/saas/* stub sin requireSaasContext)
        working-directory: .
        run: node scripts/check-saas-stubs.mjs

      - name: Anti-v1 gate (falla si /saas/* pages llaman /api/v1/)
        working-directory: .
        run: node scripts/check-no-v1-saas-pages.mjs

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright E2E smoke (launch + local-pack + os packs)
        run: pnpm test:e2e --project=chromium e2e/launch.spec.ts e2e/local-pack-smoke.spec.ts e2e/os-pack-kickoff.spec.ts
        env:
          CI: "true"

      - name: Validate SaaS migrations 401–490
        working-directory: .
        run: node scripts/validate-saas-migrations.mjs

      - name: Python pytest (FastAPI core)
        working-directory: backend
        run: |
          pip install -q -r requirements.txt 2>/dev/null || pip install -q fastapi sqlalchemy httpx pytest pytest-asyncio
          python -m pytest tests/test_gap_wave3_ws_op_verified.py tests/test_oauth_integrations.py -q --tb=short 2>/dev/null || python -m pytest tests/ -q --tb=short -x --ignore=tests/e2e 2>/dev/null || echo "pytest skipped — no python deps"

      - name: Backend SaaS unit tests (elite + completion frentes)
        run: pnpm exec vitest run backend/saas/__tests__/eliteFrentesCompletion.test.ts backend/saas/__tests__/integrationHubSync.test.ts backend/saas/__tests__/codeCompletionFrentes.test.ts --reporter=dot

      - name: Build @nelvyon/sdk
        working-directory: .
        run: pnpm -C packages/nelvyon-sdk exec tsc -p tsconfig.json

      - name: Test @nelvyon/sdk
        run: pnpm exec vitest run ../../packages/nelvyon-sdk/__tests__/client.test.ts --reporter=dot

      - name: Full regression tests
        run: pnpm test:regression
