name: Staging P0 Smokes

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "scripts/staging-smoke*.mjs"
      - "scripts/run-staging-p0-smokes.mjs"
      - "scripts/wait-staging-p0-deploy.mjs"
      - ".github/workflows/staging-smoke-p0.yml"
  workflow_dispatch:

concurrency:
  group: staging-p0-smokes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  p0-smokes:
    name: P0 smokes (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for staging deploy (Portal BFF routes)
        env:
          STAGING_WEB_URL: https://nelvyon.com
          P0_DEPLOY_MAX_ATTEMPTS: "36"
          P0_DEPLOY_INTERVAL_MS: "20000"
        run: node scripts/wait-staging-p0-deploy.mjs

      - name: Run P0 staging smokes
        env:
          STAGING_WEB_URL: https://nelvyon.com
        run: node scripts/run-staging-p0-smokes.mjs --skip-wait
