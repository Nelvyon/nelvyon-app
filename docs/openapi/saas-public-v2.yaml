openapi: 3.1.0
info:
  title: Nelvyon Public API v2
  version: 2.0.0
  description: REST API v2 for CRM, deals, workflows, webhook DLQ and GDPR.
servers:
  - url: https://app.nelvyon.com/api/public/v2
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: nlv_
paths:
  /contacts:
    get:
      summary: List contacts
    post:
      summary: Create contact
  /deals:
    get:
      summary: List deals
  /workflows/trigger:
    post:
      summary: Trigger workflow by id
  /webhooks/dlq:
    get:
      summary: List webhook delivery failures
