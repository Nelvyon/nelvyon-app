# MIG 302 — NELVYON OS @ Railway (monorepo pnpm → apps/web, Next.js standalone)
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && pnpm -C apps/web build:prod"
watchPatterns = ["apps/web/**", "backend/**", "packages/**", "pnpm-lock.yaml", "pnpm-workspace.yaml"]

[deploy]
# Migraciones antes del arranque (primera vez o tras nuevas SQL en backend/db/migrations)
startCommand = "pnpm -C apps/web migrate:prod && HOSTNAME=0.0.0.0 node apps/web/.next/standalone/apps/web/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
