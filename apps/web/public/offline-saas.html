<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0084ff" />
  <title>Sin conexión — Nelvyon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background: #020817;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      padding-top: env(safe-area-inset-top, 1.5rem);
    }
    .card {
      max-width: 360px;
      width: 100%;
      text-align: center;
      padding: 2.5rem 2rem;
      border-radius: 1.25rem;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.375rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: rgba(255,255,255,0.55); line-height: 1.6; }
    .retry {
      margin-top: 1.5rem;
      display: inline-block;
      padding: 0.625rem 1.5rem;
      border-radius: 0.625rem;
      background: #0084ff;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .retry:hover { background: #0073e0; }
    .status { margin-top: 0.75rem; font-size: 0.75rem; color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>No hay red disponible. Reconectando automáticamente cada 10 segundos.</p>
    <a href="/saas/dashboard" class="retry" id="retryBtn">Reintentar ahora</a>
    <p class="status" id="countdown">Reintentando en 10 s...</p>
  </div>
  <script>
    var secs = 10;
    var el = document.getElementById("countdown");
    var interval = setInterval(function() {
      secs--;
      if (el) el.textContent = "Reintentando en " + secs + " s...";
      if (secs <= 0) {
        clearInterval(interval);
        window.location.href = "/saas/dashboard";
      }
    }, 1000);
  </script>
</body>
</html>
