<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0066FF" />
    <title>NELVYON — Sin conexión</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000000;
        color: #ffffff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .logo {
        width: 5rem;
        height: 5rem;
        border-radius: 1rem;
        background: #0066ff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        font-weight: 800;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.75rem;
        letter-spacing: 0.04em;
      }
      p {
        margin-top: 1rem;
        color: #a3a3a3;
        max-width: 20rem;
      }
    </style>
  </head>
  <body>
    <div class="logo" aria-hidden="true">N</div>
    <h1>NELVYON</h1>
    <p>Conectando con NELVYON...</p>
    <script>
      setInterval(function () {
        if (navigator.onLine) window.location.href = "/dashboard";
      }, 10000);
    </script>
  </body>
</html>
