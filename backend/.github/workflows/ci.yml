# NELVYON OS — CI/CD Pipeline
# Runs on every push and PR to main/develop branches
#
# Stages:
# 1. Lint — Code quality checks
# 2. Unit Test — Fast tests with SQLite
# 3. Integration Test — Full tests with PostgreSQL + Redis
# 4. Build — Verify application starts correctly
# 5. Security — Dependency audit

name: NELVYON CI

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: "🔍 Lint & Code Quality"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff

      - name: Run Ruff linter
        run: |
          cd backend
          ruff check . --select E,W,F --ignore E501

  unit-test:
    name: "🧪 Unit Tests (SQLite)"
    runs-on: ubuntu-latest
    needs: lint
    env:
      ENVIRONMENT: test
      DATABASE_URL: "sqlite+aiosqlite:///test.db"
      JWT_SECRET_KEY: "ci-test-secret-key"
      ADMIN_EMAIL: "admin@test.com"
      ADMIN_PASSWORD: "CITestPassword123!"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          cd backend
          python -m pytest tests/test_health.py tests/test_crm.py tests/test_redis_adapter.py tests/test_job_queue.py tests/test_workspace_isolation.py tests/test_auth.py tests/test_tenant_require_workspace.py tests/test_regression_abcd_smoke.py -v --tb=short -x

  integration-test:
    name: "🔗 Integration Tests (PostgreSQL + Redis)"
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nelvyon
          POSTGRES_PASSWORD: nelvyon
          POSTGRES_DB: nelvyon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: test
      DATABASE_URL: "postgresql+asyncpg://nelvyon:nelvyon@localhost:5432/nelvyon_test"
      REDIS_URL: "redis://localhost:6379/0"
      JWT_SECRET_KEY: "ci-integration-test-key"
      ADMIN_EMAIL: "admin@test.com"
      ADMIN_PASSWORD: "CITestPassword123!"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run integration tests
        run: |
          cd backend
          python -m pytest tests/test_integration.py tests/test_health.py tests/test_workspace_isolation.py -v --tb=short -x

  build:
    name: "🏗️ Build Verification"
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    env:
      ENVIRONMENT: test
      DATABASE_URL: "sqlite+aiosqlite:///test.db"
      JWT_SECRET_KEY: "ci-build-key"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Verify all module imports
        run: |
          cd backend
          python -c "
          import importlib
          modules = [
              'main',
              'core.config',
              'core.database',
              'core.redis_adapter',
              'core.job_queue',
              'core.staging',
              'services.contacts',
              'services.deals',
              'services.pipeline_deals',
              'services.crm_analytics',
              'services.contract_signing',
              'services.helpdesk_notifications',
              'services.email_service',
              'services.esignature_adapter',
              'middlewares.rate_limiter',
              'middlewares.security',
              'middlewares.error_handler',
              'middlewares.request_id',
          ]
          for mod in modules:
              importlib.import_module(mod)
              print(f'✅ {mod}')
          print('All modules imported successfully')
          "

  security:
    name: "🔒 Security Audit"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        run: |
          cd backend
          pip-audit --strict || true
        continue-on-error: true