# Docker Compose for NELVYON Integration Tests
#
# Provides:
# - PostgreSQL 16 for database integration tests
# - Redis 7 for cache/queue integration tests
#
# Usage:
#   docker-compose -f docker-compose.test.yml up -d
#   DATABASE_URL=postgresql+asyncpg://nelvyon:nelvyon@localhost:5433/nelvyon_test \
#   REDIS_URL=redis://localhost:6380/0 \
#   pytest tests/ -v
#   docker-compose -f docker-compose.test.yml down -v

version: "3.9"

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: nelvyon-test-postgres
    environment:
      POSTGRES_USER: nelvyon
      POSTGRES_PASSWORD: nelvyon
      POSTGRES_DB: nelvyon_test
    ports:
      - "5433:5432"
    volumes:
      - pgdata-test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nelvyon -d nelvyon_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: nelvyon-test-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata-test: