<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="%VITE_APP_LOGO_URL%" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%VITE_APP_TITLE%</title>
    <meta name="description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="author" content="NELVYON" />

    <!-- SEO Elite: Allow indexing for public pages -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://nelvyon.com/" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7C3AED" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NELVYON" />

    <!-- Security headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nelvyon.com/" />
    <meta property="og:title" content="NELVYON — Agencia Digital Elite | SaaS, Web, IA & Automatización" />
    <meta property="og:description" content="Plataformas SaaS, webs de alto impacto, marketing digital y automatización con IA. Nivel élite mundial. Más barato que GoHighLevel con más funcionalidades." />
    <meta property="og:image" content="https://mgx-backend-cdn.metadl.com/generate/images/1072753/2026-04-07/d6d03fe8-0fb1-4f21-94dc-893085a143c6.png" />
    <meta property="og:site_name" content="NELVYON" />
    <meta property="og:locale" content="es_ES" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NELVYON — Agencia Digital Elite | SaaS, Web, IA & Automatización" />
    <meta name="twitter:description" content="Plataformas SaaS, webs de alto impacto, marketing digital y automatización con IA. Nivel élite mundial." />
    <meta name="twitter:image" content="https://mgx-backend-cdn.metadl.com/generate/images/1072753/2026-04-07/d6d03fe8-0fb1-4f21-94dc-893085a143c6.png" />

    <!-- SEO Keywords -->
    <meta name="keywords" content="agencia digital, SaaS, diseño web, marketing digital, automatización, inteligencia artificial, CRM, GoHighLevel alternativa, plataforma SaaS, ciberseguridad, NELVYON, España" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "NELVYON",
      "url": "https://nelvyon.com",
      "logo": "https://nelvyon.com/logo.png",
      "description": "Agencia digital elite especializada en plataformas SaaS, diseño web, marketing digital, automatización con IA y ciberseguridad.",
      "foundingDate": "2024",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "contacto@nelvyon.com",
        "contactType": "customer service",
        "availableLanguage": ["Spanish", "English"]
      },
      "sameAs": [
        "https://twitter.com/nelvyon",
        "https://linkedin.com/company/nelvyon",
        "https://instagram.com/nelvyon"
      ],
      "areaServed": "Worldwide"
    }
    </script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NELVYON",
      "url": "https://nelvyon.com",
      "description": "Plataformas SaaS, webs de alto impacto y automatización con IA de nivel élite mundial.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://nelvyon.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Service offerings -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "Digital Agency Services",
      "provider": {
        "@type": "Organization",
        "name": "NELVYON"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Planes NELVYON",
        "itemListElement": [
          {
            "@type": "Offer",
            "name": "Starter",
            "price": "79",
            "priceCurrency": "EUR",
            "description": "CRM básico, Email Marketing, Calendario, Conversaciones, Forms, Blog, Templates"
          },
          {
            "@type": "Offer",
            "name": "Pro",
            "price": "249",
            "priceCurrency": "EUR",
            "description": "CRM completo, Pipelines, Campañas, Funnels, Social Media, Helpdesk, VoIP, Workflows, Analytics"
          },
          {
            "@type": "Offer",
            "name": "Enterprise",
            "price": "449",
            "priceCurrency": "EUR",
            "description": "Todo incluido: White-Label, Video Ads, IA Autopilot, Ciberseguridad SENTINEL, Agentes IA, API completa"
          },
          {
            "@type": "Offer",
            "name": "Partner",
            "price": "50",
            "priceCurrency": "EUR",
            "description": "Programa Partners con dashboard, contratos auto-generados y pago por trabajo"
          }
        ]
      }
    }
    </script>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
